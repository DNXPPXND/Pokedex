<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Mainframe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        body { background-color: #2d3436; font-family: 'VT323', monospace; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        .pokedex-case { background-color: #dc0a2d; border: 8px solid #8b0000; border-radius: 20px; box-shadow: 15px 15px 0px #5e0000; }
        .pokedex-screen { background-color: #1a1a1a; border: 12px solid #404040; border-radius: 10px; box-shadow: inset 0 0 20px rgba(0,0,0,0.9); height: 70vh; }
        .pokemon-card { background: #2a2a2a; border: 2px solid #444; image-rendering: pixelated; }
        .pokemon-card:hover { border-color: #eee; background: #333; }
        .custom-dropdown:hover .dropdown-content { display: block; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #404040; border: 4px solid #222; min-width: 150px; z-index: 50; max-height: 250px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #dc0a2d; border: 2px solid #404040; }
        .status-light-big { width: 45px; height: 45px; background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8); border: 4px solid white; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-6">
    <div class="max-w-6xl w-full pokedex-case overflow-hidden">
        <div class="p-4 md:p-6 border-b-8 border-red-800 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="status-light-big rounded-full animate-pulse"></div>
                <h1 class="text-white retro-font text-sm md:text-lg ml-2 italic tracking-tighter">POKÉDEX</h1>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <input type="text" id="pokemonSearch" placeholder="SEARCH..." class="flex-grow md:w-64 bg-black text-green-500 border-4 border-gray-600 px-4 py-1 font-mono text-sm focus:outline-none focus:border-blue-400">
                <div class="relative custom-dropdown">
                    <button class="bg-gray-800 text-white px-4 py-2 border-b-4 border-black font-bold text-xs uppercase hover:bg-gray-700">TYPE ▾</button>
                    <div id="type-menu" class="dropdown-content"></div>
                </div>
            </div>
        </div>

        <div id="main-screen" class="pokedex-screen m-4 p-4 md:p-6 overflow-y-auto">
            <p class="text-white text-center py-20">INITIALIZING SYSTEM...</p>
        </div>

        <div class="p-4 bg-red-700 flex justify-between items-center px-10 border-t-4 border-red-900">
            <div class="flex gap-4">
                <div class="w-16 h-3 bg-blue-900 rounded-full border-2 border-black"></div>
                <div class="w-16 h-3 bg-green-900 rounded-full border-2 border-black"></div>
            </div>
            <div class="w-12 h-12 bg-black rounded-full border-4 border-gray-600"></div>
        </div>
    </div>

    <script>
        const typeColors = {
            fire: 'bg-orange-500', water: 'bg-blue-500', grass: 'bg-green-500', electric: 'bg-yellow-400',
            ice: 'bg-cyan-300', fighting: 'bg-red-700', poison: 'bg-purple-500', ground: 'bg-yellow-700',
            flying: 'bg-indigo-300', psychic: 'bg-pink-500', bug: 'bg-lime-500', rock: 'bg-stone-600',
            ghost: 'bg-violet-800', dragon: 'bg-indigo-700', dark: 'bg-gray-800', steel: 'bg-slate-400',
            fairy: 'bg-pink-300', normal: 'bg-gray-400'
        };

        async function initPokedex() {
            const screen = document.getElementById('main-screen');
            const typeMenu = document.getElementById('type-menu');
            
            try {
                const res = await fetch('https://pokeapi.co/api/v2/type');
                const data = await res.json();
                const types = data.results.filter(t => t.name !== 'shadow' && t.name !== 'unknown');

                screen.innerHTML = '';
                
                for (const type of types) {
                    // สร้างเมนู Dropdown
                    typeMenu.innerHTML += `<a href="#type-${type.name}" class="block px-4 py-2 text-white text-[10px] hover:bg-red-600 border-b border-black uppercase">${type.name}</a>`;

                    // สร้าง Section ของแต่ละธาตุ
                    const typeRes = await fetch(type.url);
                    const typeData = await typeRes.json();
                    const pokemonList = typeData.pokemon;

                    const section = document.createElement('section');
                    section.id = `type-${type.name}`;
                    section.className = 'type-section mb-12';
                    
                    let cardsHtml = `
                        <div class="sticky top-0 z-20 py-1 bg-[#1a1a1a] flex items-center mb-4 border-b-2 border-gray-700">
                            <span class="w-3 h-3 bg-red-600 rounded-full mr-3"></span>
                            <h2 class="text-white retro-font text-[10px] uppercase">${type.name} <span class="text-gray-500">[${pokemonList.length}]</span></h2>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4">
                    `;

                    pokemonList.forEach(p => {
                        const id = p.pokemon.url.split('/').filter(Boolean).pop();
                        if (id > 1025) return;
                        
                        cardsHtml += `
                            <a href="detail.html?id=${id}" data-name="${p.pokemon.name.toLowerCase()}" class="pokemon-card p-3 rounded flex flex-col items-center group transition-all active:translate-y-1">
                                <div class="w-full bg-white rounded p-2 mb-2 shadow-inner border-2 border-black">
                                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png" loading="lazy" class="w-full h-auto group-hover:scale-110 transition-transform">
                                </div>
                                <p class="text-[10px] text-gray-500 mb-1">ID: ${id.padStart(3, '0')}</p>
                                <h3 class="text-white text-xs font-bold capitalize truncate w-full text-center mb-2">${p.pokemon.name}</h3>
                                <div class="w-full h-1.5 ${typeColors[type.name] || 'bg-gray-500'} rounded-full border border-black/50"></div>
                            </a>
                        `;
                    });

                    cardsHtml += `</div>`;
                    section.innerHTML = cardsHtml;
                    screen.appendChild(section);
                }

                // Search Logic
                document.getElementById('pokemonSearch').addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase();
                    const allCards = document.querySelectorAll('.pokemon-card');
                    allCards.forEach(card => {
                        const name = card.getAttribute('data-name');
                        card.style.display = name.includes(query) ? 'flex' : 'none';
                    });
                });

            } catch (e) {
                screen.innerHTML = '<p class="text-red-500 text-center">SYSTEM ERROR: CONNECTION LOST</p>';
            }
        }
        initPokedex();
    </script>
</body>
</html>
